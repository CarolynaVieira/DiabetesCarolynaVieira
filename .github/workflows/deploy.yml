name: Deploy static sites

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-principal:
    name: Deploy principal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload principal
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./principal/
          server-dir: ./public_html/
          state-name: .ftp-deploy-sync-state-principal.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            diabetes/**
            checkup/**
            prevencao/**
            emagrecimento/**

  deploy-diabetes:
    name: Deploy diabetes
    needs: deploy-principal
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload diabetes
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./diabetes/
          server-dir: ./public_html/diabetes/
          state-name: .ftp-deploy-sync-state-diabetes.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**

  deploy-checkup:
    name: Deploy checkup
    needs: deploy-diabetes
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload checkup
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./checkup/
          server-dir: ./public_html/checkup/
          state-name: .ftp-deploy-sync-state-checkup.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**

  deploy-emagrecimento:
    name: Deploy emagrecimento
    needs: deploy-prevencao
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload emagrecimento
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./emagrecimento/
          server-dir: ./public_html/emagrecimento/
          state-name: .ftp-deploy-sync-state-emagrecimento.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**

  deploy-prevencao:
    name: Deploy prevencao
    needs: deploy-checkup
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload prevencao
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./prevencao/
          server-dir: ./public_html/prevencao/
          state-name: .ftp-deploy-sync-state-prevencao.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
